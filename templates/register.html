<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Crear cuenta</title>

  <link rel="stylesheet" href="{{ url_for('static', filename = 'css/register.css') }}"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
</head>
<body>

  <div class="register-card">

    <!-- Cabecera -->
    <div class="card-header">
      <div class="brand-icon"><i class="ti ti-user-plus"></i></div>
      <div class="card-header-text">
        <h1>Crea una cuenta</h1>
        <p>Completa tu información para registrarte</p>
      </div>
    </div>

    <!-- Error global -->
    <div class="error-msg" id="error-msg">
      <i class="ti ti-alert-circle"></i>
      <span id="error-text">Por favor completa todos los campos.</span>
    </div>

    <!-- Cuerpo: formulario + avatar -->
    <div class="form-body">

      <!-- Campos -->
      <div class="form-fields">

        <div class="row-2">
          <!-- Nombre -->
          <div class="field-group">
            <label class="field-label" for="nombre">Nombre</label>
            <div class="field-wrap">
              <i class="ti ti-user field-icon"></i>
              <input type="text" id="nombre" placeholder="Juan Fernando" autocomplete="given-name"/>
            </div>
          </div>

          <!-- Apellido -->
          <div class="field-group">
            <label class="field-label" for="apellido">Apellido</label>
            <div class="field-wrap">
              <i class="ti ti-user field-icon"></i>
              <input type="text" id="apellido" placeholder="Hernández García" autocomplete="family-name"/>
            </div>
          </div>
        </div>

        <div class="row-2">
          <!-- Usuario -->
          <div class="field-group">
            <label class="field-label" for="usuario">Usuario</label>
            <div class="field-wrap">
              <i class="ti ti-at field-icon"></i>
              <input type="text" id="usuario" placeholder="fernyrxx" autocomplete="username"/>
            </div>
          </div>

          <!-- Fecha de nacimiento -->
          <div class="field-group">
            <label class="field-label" for="fecha">Fecha de nacimiento</label>
            <div class="field-wrap">
              <i class="ti ti-calendar field-icon"></i>
              <input type="date" id="fecha"/>
            </div>
          </div>
        </div>

        <!-- Correo -->
        <div class="field-group">
          <label class="field-label" for="correo">Correo electrónico</label>
          <div class="field-wrap">
            <i class="ti ti-mail field-icon"></i>
            <input type="email" id="correo" placeholder="juan09az399@gmail.com" autocomplete="email"/>
          </div>
        </div>

        <!-- Contraseña -->
        <div class="field-group">
          <label class="field-label" for="password">Contraseña</label>
          <div class="field-wrap">
            <i class="ti ti-lock field-icon"></i>
            <input type="password" id="password" placeholder="••••••••" autocomplete="new-password"/>
            <button class="toggle-pass" id="toggle-pw" type="button" aria-label="Mostrar contraseña">
              <i class="ti ti-eye" id="eye-icon" style="font-size:16px"></i>
            </button>
          </div>
        </div>

        <!-- Botón -->
        <button class="btn-register" id="btn-crear" type="button">
          <i class="ti ti-user-check"></i>
          Crear cuenta
        </button>

      </div><!-- /form-fields -->

      <!-- Avatar -->
      <div class="avatar-section">
        <div class="avatar-wrap" id="avatar-wrap" title="Subir foto">
          <i class="ti ti-user-circle"></i>
          <img id="avatar-img" alt="Foto de perfil"/>
          <div class="avatar-overlay"><i class="ti ti-camera"></i></div>
        </div>
        <span class="avatar-hint">Foto de perfil<br/>(opcional)</span>
        <input type="file" id="avatar-input" accept="image/*" style="display:none"/>
      </div>

    </div><!-- /form-body -->

    <!-- Enlace a login -->
    <p class="login-row">
      ¿Ya tienes una cuenta?
      <a href="index.html" class="login-link">Inicia sesión</a>
    </p>

  </div><!-- /register-card -->

  <script>
    // Mostrar/ocultar contraseña
    const pwInput = document.getElementById('password');
    const eyeIcon = document.getElementById('eye-icon');
    document.getElementById('toggle-pw').addEventListener('click', () => {
      const show = pwInput.type === 'password';
      pwInput.type = show ? 'text' : 'password';
      eyeIcon.className = show ? 'ti ti-eye-off' : 'ti ti-eye';
    });

    // Preview de avatar
    const avatarInput = document.getElementById('avatar-input');
    const avatarImg   = document.getElementById('avatar-img');
    document.getElementById('avatar-wrap').addEventListener('click', () => avatarInput.click());
    avatarInput.addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        avatarImg.src = ev.target.result;
        avatarImg.style.display = 'block';
      };
      reader.readAsDataURL(file);
    });

    // Validación básica
    document.getElementById('btn-crear').addEventListener('click', () => {
      const campos = ['nombre','apellido','usuario','fecha','correo','password'];
      const errBox  = document.getElementById('error-msg');
      const errText = document.getElementById('error-text');
      const vacio   = campos.some(id => !document.getElementById(id).value.trim());

      if (vacio) {
        errText.textContent = 'Por favor completa todos los campos obligatorios.';
        errBox.style.display = 'flex';
      } else {
        errBox.style.display = 'none';
        // Aquí conectas tu lógica de registro
        console.log('Creando cuenta...');
      }
    });
  </script>

</body>
</html>
