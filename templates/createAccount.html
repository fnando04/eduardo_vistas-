<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Crear Cuenta Asesor</title>

    <link rel="shortcut icon" href="assets/icons/shortcutIcon.png">

    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="stylesheet" href="assets/css/createAccount.css" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body>
    <div class="page-wrapper">
        <aside class="sidebar">
            <div class="avatar-wrapper">
                <div class="avatar-circle" id="avatarPreview">
                    <i class="fas fa-user avatar-icon" id="avatarIcon"></i>
                    <img id="avatarImg" src="" alt="Foto de perfil" style="display:none;" />
                    <div class="avatar-overlay" id="avatarOverlay">
                        <i class="fas fa-camera"></i>
                    </div>
                </div>

                <input type="file" id="photoInput" accept="image/*" hidden />
                <p class="avatar-label">Selecciona una foto de perfil</p>
            </div>

            <div class="sidebar-deco"></div>
        </aside>

        <main class="form-panel">
            <div class="form-header">
                <h1 class="form-title">CREA TU CUENTA ASESOR</h1>
                <p class="form-subtitle">Completa los datos para registrarte como asesor</p>
            </div>

            <div id="alertBox" class="alert hidden"></div>

            <div class="form-body">

                <div class="form-row one-col">
                    <!-- Nombre -->
                    <div class="field-group">
                        <label class="field-label" for="nombres">Nombre(s)</label>
                        <div class="input-wrap">
                            <input type="text" id="nombres" class="field-input" placeholder="Tu nombre"
                                autocomplete="off" />
                        </div>
                        <span class="field-error" id="err-nombres"></span>
                    </div>
                </div>

                <div class="form-row two-col">
                    <!-- Apellido P -->
                    <div class="field-group">
                        <label class="field-label" for="apellidos">Apellido Paterno</label>
                        <div class="input-wrap">
                            <input type="text" id="apellidoP" class="field-input" placeholder="Primer apellido"
                                autocomplete="off" />
                        </div>
                        <span class="field-error" id="err-apellidoP"></span>
                    </div>

                    <!-- Apellido M -->
                    <div class="field-group">
                        <label class="field-label" for="apellidoM">Apellido Materno</label>
                        <div class="input-wrap">
                            <input type="text" id="apellidoM" class="field-input" placeholder="Segundo apellido"
                                autocomplete="off" />
                        </div>
                        <span class="field-error" id="err-apellidoM"></span>
                    </div>
                </div>

                <div class="form-row one-col">
                    <!-- Nombre de usuario -->
                    <div class="field-group">
                        <label class="field-label" for="usuario">Nombre de usuario</label>
                        <div class="input-wrap">
                            <input type="text" id="usuario" class="field-input" placeholder="Usuario"
                                autocomplete="off" />
                        </div>
                        <span class="field-error" id="err-usuario"></span>
                    </div>
                </div>

                <div class="form-row two-col">
                    <!-- Contraseña -->
                    <div class="field-group">
                        <label class="field-label" for="password">Contraseña</label>
                        <div class="input-wrap">
                            <input type="password" id="password" class="field-input" placeholder="••••••••" />
                            <span class="input-icon toggle-visibility" data-target="password">
                                <i class="fas fa-eye"></i>
                            </span>
                        </div>
                        <span class="field-error" id="err-password"></span>
                    </div>

                    <!-- Confirmar Contraseña -->
                    <div class="field-group">
                        <label class="field-label" for="confirmPassword">Confirmar Contraseña</label>
                        <div class="input-wrap">
                            <input type="password" id="confirmPassword" class="field-input" placeholder="••••••••" />
                            <span class="input-icon toggle-visibility" data-target="confirmPassword">
                                <i class="fas fa-eye"></i>
                            </span>
                        </div>
                        <span class="field-error" id="err-confirmPassword"></span>
                    </div>
                </div>

                <div class="form-row two-col">
                    <!-- Fecha de nacimiento -->
                    <div class="field-group">
                        <label class="field-label" for="fechaNacimiento">Fecha de nacimiento</label>
                        <div class="input-wrap">
                            <input type="date" id="fechaNacimiento" class="field-input" />
                            <span class="input-icon"><i class="fas fa-calendar-alt"></i></span>
                        </div>
                        <span class="field-error" id="err-fechaNacimiento"></span>
                    </div>

                    <!-- Cuota -->
                    <div class="field-group">
                        <label class="field-label" for="cuota">Cuota</label>
                        <div class="input-wrap">
                            <input type="number" id="cuota" class="field-input" placeholder="$0.00" min="0" step="0.01" />
                        </div>
                        <span class="field-error" id="err-cuota"></span>
                    </div>
                </div>

                <div class="form-row two-col">
                    <!-- Categoría -->
                    <div class="field-group">
                        <label class="field-label" for="categoria">Categoría</label>
                        <div class="input-wrap select-wrap">
                            <select id="categoria" class="field-input field-select">
                                <option value="">Selecciona una categoría</option>
                                <option value="matematicas">Matemáticas</option>
                                <option value="ciencias">Ciencias</option>
                                <option value="idiomas">Idiomas</option>
                                <option value="historia">Historia</option>
                                <option value="arte">Arte</option>
                                <option value="tecnologia">Tecnología</option>
                                <option value="otro">Otro</option>
                            </select>
                            <span class="input-icon"><i class="fas fa-chevron-down"></i></span>
                        </div>
                        <span class="field-error" id="err-categoria"></span>
                    </div>

                    <!-- Tema de la clase -->
                    <div class="field-group">
                        <label class="field-label" for="temaClase">Tema de la clase</label>
                        <div class="input-wrap">
                            <input type="text" id="temaClase" class="field-input"
                                placeholder="Ej: Álgebra, Inglés básico..." />
                        </div>
                        <span class="field-error" id="err-temaClase"></span>
                    </div>
                </div>

                <div class="form-row submit-row">
                    <button class="btn-submit" id="btnCrear" type="button">
                        <span class="btn-content">
                            <i class="fas fa-plus-circle"></i>
                            <span id="btnText">CREAR CUENTA</span>
                        </span>
                        <span class="btn-loader hidden" id="btnLoader">
                            <i class="fas fa-spinner fa-spin"></i> Enviando...
                        </span>
                    </button>
                </div>

            </div>
        </main>
    </div>

    <script src="assets/js/createAccount.js"></script>
</body>

</html>
