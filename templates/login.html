<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Iniciar Sesión</title>

    <link rel="shortcut icon" href="{{ url_for('static', filename = 'icons/shortcutIcon.png') }}">

    <link rel="stylesheet" href="{{ url_for('static', filename = 'css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename = 'css/login.css') }}" >

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
</head>
<body>
    <div class="login-card">
        <div class="brand-icon"><i class="ti ti-shield-lock"></i></div>
        <h1 class="login-title">Bienvenido</h1>
        <p class="login-sub">Ingresa tus credenciales para continuar</p>

        <div class="error-msg" id="error-msg">
            <i class="ti ti-alert-circle"></i>
            <span id="error-text">Por favor completa todos los campos.</span>
        </div>

        <div class="field-group">
            <label class="field-label" for="email">CORREO ELECTRÓNICO</label>
            <div class="field-wrap">
                <i class="ti ti-mail field-icon"></i>
                <input type="email" id="email" placeholder="tu@correo.com" autocomplete="email" />
            </div>
        </div>

        <div class="field-group">
            <label class="field-label" for="password">CONTRASEÑA</label>
            <div class="field-wrap">
                <i class="ti ti-lock field-icon"></i>
                <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
                <button class="toggle-pass" id="toggle-pw" type="button" aria-label="Mostrar contraseña">
                    <i class="ti ti-eye" id="eye-icon" style="font-size:17px"></i>
                </button>
            </div>
        </div>

        <div class="options-row">
            <label class="remember">
                <input type="checkbox" id="remember" />
                Recordarme
            </label>
            <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
        </div>

        <button class="btn-login" id="btn-ingresar" type="button">
            <i class="ti ti-login"></i>
            Iniciar sesión
        </button>

        <div class="divider">o</div>

        <p class="register-row">
            ¿No tienes una cuenta?
            <a href="/chooseAccount" class="register-link">Regístrate aquí</a>
        </p>
    </div>

    <script src="{{ url_for('static', filename = 'js/login.js') }}"></script>
</body>
</html>
