<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <link rel="stylesheet" href="templates/assets/css/styles.css"/>
</head>
<body>

  <div class="login-card">
    <div class="brand-icon"><i class="ti ti-shield-lock"></i></div>
    <h1 class="login-title">Bienvenido de nuevo</h1>
    <p class="login-sub">Ingresa tus credenciales para continuar</p>

    <div class="error-msg" id="error-msg">
      <i class="ti ti-alert-circle"></i>
      <span id="error-text">Por favor completa todos los campos.</span>
    </div>

    <div class="field-group">
      <label class="field-label" for="email">Correo electrónico</label>
      <div class="field-wrap">
        <i class="ti ti-mail field-icon"></i>
        <input type="email" id="email" placeholder="tu@correo.com" autocomplete="email" />
      </div>
    </div>

    <div class="field-group">
      <label class="field-label" for="password">Contraseña</label>
      <div class="field-wrap">
        <i class="ti ti-lock field-icon"></i>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
        <button class="toggle-pass" id="toggle-pw" type="button" aria-label="Mostrar contraseña">
          <i class="ti ti-eye" id="eye-icon" style="font-size:17px"></i>
        </button>
      </div>
    </div>

    <div class="options-row">
      <label class="remember">
        <input type="checkbox" id="remember" />
        Recordarme
      </label>
      <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
    </div>

    <button class="btn-login" id="btn-ingresar" type="button">
      <i class="ti ti-login"></i>
      Iniciar sesión
    </button>

    <div class="divider">o continúa con</div>

    <button class="btn-google" type="button">
      <div class="google-g">G</div>
      Iniciar sesión con Google
    </button>

    <p class="register-row">
      ¿No tienes una cuenta?
      <a href="#" class="register-link">Regístrate aquí</a>
    </p>
  </div>

  <script>
    const pwInput = document.getElementById('password');
    const eyeIcon = document.getElementById('eye-icon');
    const toggleBtn = document.getElementById('toggle-pw');

    toggleBtn.addEventListener('click', () => {
      const show = pwInput.type === 'password';
      pwInput.type = show ? 'text' : 'password';
      eyeIcon.className = show ? 'ti ti-eye-off' : 'ti ti-eye';
      toggleBtn.setAttribute('aria-label', show ? 'Ocultar contraseña' : 'Mostrar contraseña');
    });

    document.getElementById('btn-ingresar').addEventListener('click', () => {
      const email = document.getElementById('email').value.trim();
      const pass = pwInput.value;
      const errBox = document.getElementById('error-msg');
      const errText = document.getElementById('error-text');

      if (!email || !pass) {
        errText.textContent = 'Por favor completa todos los campos.';
        errBox.style.display = 'flex';
      } else {
        errBox.style.display = 'none';
        // Aquí conectas tu lógica de autenticación
        console.log('Iniciando sesión con:', email);
      }
    });
  </script>

</body>
</html>
