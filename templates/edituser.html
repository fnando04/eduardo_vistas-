<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Configuración</title>

    <link rel="shortcut icon" href="assets/icons/shortcutIcon.png">

    <link rel="stylesheet" href="assets/css/main.css">

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background: #f2f2f2;
        }

        .contenedor{
            width: 90%;
            max-width: 1200px;
            margin: 20px auto;
            background: #dfe2e7;
            padding: 40px;
            border-radius: 10px;
        }

        h1{
            font-size: 50px;
            margin-bottom: 30px;
            color: #1f1f1f;
        }

        .perfil{
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
        }

        .foto{
            width: 170px;
            height: 170px;
            border: 3px solid #6b7280;
            border-radius: 50%;
            position: relative;
        }

        .foto::before{
            content: "";
            width: 50px;
            height: 50px;
            border: 3px solid #6b7280;
            border-radius: 50%;
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
        }

        .foto::after{
            content: "";
            width: 110px;
            height: 55px;
            border: 3px solid #6b7280;
            border-top-left-radius: 100px;
            border-top-right-radius: 100px;
            border-bottom: none;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
        }

        .perfil p{
            margin-top: 10px;
            margin-bottom: 15px;
            color: #333;
        }

        .botones{
            display: flex;
            gap: 20px;
        }

        button{
            background: #5d667a;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover{
            background: #4a5263;
        }

        .formulario{
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px 50px;
        }

        .campo{
            display: flex;
            flex-direction: column;
        }

        .campo label{
            margin-bottom: 10px;
            color: #5a6478;
            font-size: 15px;
        }

        .campo input{
            height: 45px;
            border: 1px solid #8b93a5;
            border-radius: 5px;
            padding: 10px;
            font-size: 15px;
            outline: none;
        }

        .campo input:focus{
            border-color: #5d667a;
        }

        .guardar{
            margin-top: 40px;
            display: flex;
            justify-content: flex-end;
        }

        @media(max-width: 768px){

            h1{
                font-size: 35px;
                text-align: center;
            }

            .formulario{
                grid-template-columns: 1fr;
            }

            .botones{
                flex-direction: column;
            }

            .guardar{
                justify-content: center;
            }
        }

    </style>
</head>
<body>

    <div class="contenedor">

        <h1>Configuración</h1>

        <div class="perfil">

            <div class="foto"></div>

            <p>Editar foto</p>

            <div class="botones">
                <button>Confirmar</button>
                <button>Cancelar</button>
            </div>

        </div>

        <form class="formulario">

            <div class="campo">
                <label>Cambiar Usuario</label>
                <input type="text" placeholder="Usuario">
            </div>

            <div class="campo">
                <label>Nombre(s)</label>
                <input type="text" placeholder="Nombre">
            </div>

            <div class="campo">
                <label>Apellido Paterno</label>
                <input type="text" placeholder="Apellido paterno">
            </div>

            <div class="campo">
                <label>Apellido Materno</label>
                <input type="text" placeholder="Apellido materno">
            </div>

            <div class="campo">
                <label>Cambiar Correo Electrónico</label>
                <input type="email" placeholder="Correo electrónico">
            </div>

            <div class="campo">
                <label>Cambiar Contraseña</label>
                <input type="password" placeholder="Contraseña">
            </div>

        </form>

        <div class="guardar">
            <button type="submit">Guardar</button>
        </div>

    </div>

</body>
</html>
